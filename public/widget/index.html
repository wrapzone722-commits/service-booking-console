<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Онлайн-запись</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div id="app" class="wgb">
    <div id="wgb-error" class="wgb-error hidden"></div>
    <div id="wgb-main"></div>
    <nav id="wgb-tabbar" class="wgb-tabbar hidden">
      <button type="button" class="wgb-tabbar__btn is-active" data-nav="services">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        <span>Услуги</span>
      </button>
      <button type="button" class="wgb-tabbar__btn" data-nav="bookings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Записи</span>
      </button>
      <button type="button" class="wgb-tabbar__btn" data-nav="notifications">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span>Уведомления</span>
      </button>
      <button type="button" class="wgb-tabbar__btn" data-nav="chat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Чат</span>
      </button>
      <button type="button" class="wgb-tabbar__btn" data-nav="profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Профиль</span>
      </button>
    </nav>
  </div>
  {{WIDGET_API_INJECT}}
  <script src="widget.js"></script>
</body>
</html>

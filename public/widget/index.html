<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Онлайн-запись</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div id="app" class="wgb">
    <div id="wgb-error" class="wgb-error hidden"></div>
    <div id="wgb-main"></div>
    <p class="wgb-hint" id="wgb-key-hint">
      Укажите в адресе страницы параметры <code style="color:#aaa">api</code> (база API, например <code style="color:#aaa">https://ваш-домен/api/v1</code>)
      и <code style="color:#aaa">key</code> — API-ключ клиента из приложения (тот же, что для записи с телефона).
    </p>
  </div>
  <script src="widget.js"></script>
</body>
</html>
